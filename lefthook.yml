pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx}"
      run: bunx eslint {staged_files}
    format-check:
      glob: "*.{ts,tsx,json,md,yml,yaml,css}"
      run: bunx prettier --check {staged_files}
    typecheck:
      run: bunx tsc --noEmit
    unit-test:
      run: bun run test

pre-push:
  parallel: true
  commands:
    acceptance-http:
      run: bun run test:acceptance:http
    acceptance-browser:
      run: bun run test:acceptance:browser
